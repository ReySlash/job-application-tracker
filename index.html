<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./src/assets/logoMark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track private job applications, follow-ups, interviews, offers, and outcomes from one focused dashboard."
    />
    <title>Job Application Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function restoreGithubPagesRoute() {
        const searchParams = new URLSearchParams(window.location.search);
        const redirectedPath = searchParams.get('p');

        if (!redirectedPath) {
          return;
        }

        const redirectedQuery = searchParams.get('q');
        const normalizedBasePath = window.location.pathname.replace(/\/$/, '');
        const nextUrl = `${normalizedBasePath}${redirectedPath}${redirectedQuery ? `?${redirectedQuery.replace(/~and~/g, '&')}` : ''}${window.location.hash}`;

        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
